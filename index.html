<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest · Night Phase</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; min-height: 100vh; }

    .root {
      min-height: 100vh;
      background: #000;
      color: #fff8e8;
      font-family: 'Crimson Pro', Georgia, serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 0.75rem 1rem 1.5rem;
    }

    .small-title { font-family:'Cinzel Decorative',serif; font-size:0.65rem; letter-spacing:0.3em; color:#a08858; text-transform:uppercase; margin-bottom:0.1rem; }

    h1 {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(2rem,7vw,3.6rem);
      font-weight:700; color:#ffd84a;
      text-shadow:0 0 20px rgba(255,216,74,0.7),0 0 40px rgba(255,216,74,0.3),0 2px 6px rgba(0,0,0,0.9);
      text-align:center; margin-bottom:0.15rem;
    }

    .divider {
      width:300px; height:2px; margin:0 auto 0.6rem;
      background:linear-gradient(90deg,transparent,#c4202e,#ffd84a,#c4202e,transparent);
    }

    .screen { width:100%; display:flex; flex-direction:column; align-items:center; }
    .screen.hidden { display:none; }

    .screen-label { font-size:0.8rem; color:#c8a84a; margin-bottom:0.6rem; letter-spacing:0.15em; text-transform:uppercase; }

    /* PLAYER GRID */
    .player-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:0.75rem; max-width:360px; width:100%; margin-bottom:0.6rem;
    }

    .player-btn {
      background:#2d1820; border:1px solid rgba(255,216,74,0.5);
      color:#ffd84a; font-family:'Cinzel Decorative',serif;
      padding:0.7rem; border-radius:6px; cursor:pointer; transition:all 0.2s;
    }
    .player-btn:hover { background:#4a1e28; border-color:#ffd84a; transform:translateY(-2px); box-shadow:0 6px 20px rgba(196,32,46,0.4); }
    .player-btn .pcount { display:block; font-size:1.4rem; }
    .player-btn .plabel { display:block; font-family:'Crimson Pro',serif; font-size:0.7rem; letter-spacing:0.15em; opacity:0.7; margin-top:2px; }

    /* CARDS */
    .card-section { width:100%; max-width:500px; margin-bottom:0.75rem; }
    .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem; }
    .section-title { font-family:'Cinzel Decorative',serif; font-size:0.85rem; letter-spacing:0.12em; font-weight:700; }
    .good-title { color:#6ecfee; text-shadow:0 0 12px rgba(74,159,200,0.6); }
    .evil-title { color:#ff4444; text-shadow:0 0 12px rgba(255,68,68,0.6); }
    .section-count { font-size:0.75rem; padding:0.2rem 0.6rem; border-radius:20px; letter-spacing:0.1em; }
    .good-count { background:#162a3a; color:#6ecfee; border:1px solid rgba(110,207,238,0.6); }
    .evil-count { background:#2a1010; color:#ff5555; border:1px solid rgba(255,68,68,0.6); }

    .role-card {
      display:flex; align-items:center; gap:0.75rem;
      padding:0.7rem 1rem; margin-bottom:0.4rem;
      border-radius:5px; border:1px solid transparent;
      transition:all 0.2s; cursor:pointer; user-select:none;
    }
    .role-card.good { background:#161e28; border-color:rgba(74,159,200,0.4); }
    .role-card.evil { background:#281414; border-color:rgba(255,68,68,0.4); }
    .role-card.good.active { background:#1e2e42; border-color:rgba(110,207,238,0.8); box-shadow:0 0 8px rgba(92,184,255,0.1); }
    .role-card.evil.active { background:#3a1818; border-color:rgba(255,68,68,0.85); box-shadow:0 0 8px rgba(232,64,64,0.12); }
    .role-card.locked { opacity:0.65; cursor:default; }

    .role-checkbox {
      width:18px; height:18px; border-radius:3px; border:1.5px solid;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; font-size:11px; transition:all 0.15s;
    }
    .good .role-checkbox { border-color:rgba(74,159,200,0.35); color:#5ab4d4; }
    .evil .role-checkbox { border-color:rgba(232,64,64,0.35); color:#e84040; }
    .good.active .role-checkbox { border-color:#5ab4d4; background:rgba(74,159,200,0.22); }
    .evil.active .role-checkbox { border-color:#e84040; background:rgba(232,64,64,0.18); }

    .role-info { flex:1; }
    .role-name { font-family:'Cinzel Decorative',serif; font-size:0.8rem; color:#fff8e8; font-weight:700; }
    .role-desc { font-size:0.75rem; color:#c0a060; font-style:italic; margin-top:1px; }
    .role-tag { font-size:0.65rem; letter-spacing:0.1em; padding:1px 5px; border-radius:3px; white-space:nowrap; }
    .tag-required { background:#2e2608; color:#f5c842; border:1px solid rgba(245,200,66,0.4); }
    .tag-auto { background:#222226; color:#aaa; }

    .ratio-bar {
      max-width:500px; width:100%; margin-bottom:0.75rem;
      padding:0.75rem 1rem; background:#1e1a14;
      border:1px solid rgba(255,216,74,0.5); border-radius:5px;
      display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;
    }
    .ratio-ok { color:#5dbb8a; font-weight:bold; }
    .ratio-bad { color:#e84040; }

    /* BUTTONS */
    .btn-primary {
      background:linear-gradient(135deg,#a8182a,#e03040,#ffd84a,#e03040,#a8182a);
      background-size:300% 300%; border:1px solid rgba(255,216,74,0.5); color:#fff8e8;
      font-family:'Cinzel Decorative',serif; font-size:0.85rem;
      padding:0.9rem 2.5rem; border-radius:4px; cursor:pointer;
      letter-spacing:0.1em; transition:all 0.3s; animation:shimmer 4s ease infinite;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
    }
    @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 25px rgba(196,32,46,0.6),0 0 15px rgba(255,216,74,0.3); }
    .btn-primary:disabled { opacity:0.3; cursor:not-allowed; animation:none; }

    .btn-ghost {
      background:#14243a; border:1px solid rgba(92,184,255,0.25);
      color:#7ea8ff; font-family:'Crimson Pro',serif; font-size:0.85rem;
      padding:0.6rem 1.5rem; border-radius:4px; cursor:pointer;
      letter-spacing:0.1em; transition:all 0.2s; margin-top:0.4rem;
    }
    .btn-ghost:hover { color:#aec8ff; border-color:rgba(92,184,255,0.5); background:#1a2e48; }

    /* VOICE PICKER */
    .voice-grid { width:100%; max-width:480px; display:flex; flex-direction:column; gap:0.6rem; margin-bottom:0.75rem; }
    .voice-row {
      display:flex; align-items:center; gap:0.75rem;
      padding:0.85rem 1rem; border-radius:6px;
      border:1px solid rgba(255,216,74,0.15); background:#281820;
      cursor:pointer; transition:all 0.2s; user-select:none;
    }
    .voice-row:hover { background:#3a1e28; border-color:rgba(255,216,74,0.4); }
    .voice-row.selected { background:linear-gradient(135deg,#3d1a22,#1a2d3d); border-color:#ffd84a; box-shadow:0 0 15px rgba(255,216,74,0.2); }
    .voice-radio { width:16px; height:16px; border-radius:50%; border:1.5px solid rgba(255,216,74,0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .voice-row.selected .voice-radio { border-color:#ffd84a; background:rgba(255,216,74,0.2); }
    .voice-radio-dot { width:7px; height:7px; border-radius:50%; background:#ffd84a; opacity:0; transition:opacity 0.15s; }
    .voice-row.selected .voice-radio-dot { opacity:1; }
    .voice-info { flex:1; }
    .voice-name { font-family:'Cinzel Decorative',serif; font-size:0.82rem; color:#fff8e8; font-weight:700; }
    .voice-emoji { font-size:1.4rem; }
    .preview-btn {
      background:#1a2c3e; border:1px solid rgba(60,140,185,0.5);
      color:#5ab4d4; font-size:0.75rem; font-family:'Crimson Pro',serif;
      padding:0.35rem 0.75rem; border-radius:3px; cursor:pointer;
      white-space:nowrap; transition:all 0.15s;
    }
    .preview-btn:hover { background:#1e3448; }
    .preview-btn.playing { color:#ffcc44; border-color:rgba(255,204,68,0.5); }

    /* NIGHT PHASE */
    .night-screen { width:100%; max-width:520px; text-align:center; display:flex; flex-direction:column; align-items:center; }
    .step-indicator { display:flex; gap:0.4rem; justify-content:center; margin-bottom:1rem; }
    .step-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,216,74,0.2); transition:all 0.3s; }
    .step-dot.done { background:#c4202e; box-shadow:0 0 6px rgba(196,32,46,0.8); }
    .step-dot.current { background:#ffd84a; box-shadow:0 0 14px rgba(255,216,74,1.0); width:22px; border-radius:3px; }

    .narration-box {
      background:linear-gradient(160deg,#2a1418,#141c28);
      border:2px solid rgba(255,216,74,0.7); border-radius:8px;
      padding:1.25rem; margin-bottom:1rem; min-height:150px; width:100%;
      display:flex; align-items:center; justify-content:center; position:relative;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),0 4px 20px rgba(0,0,0,0.4);
    }
    .narration-text {
      font-size:clamp(1rem,2.5vw,1.25rem); line-height:1.8; font-weight:500;
      font-style:italic; color:#fff8e8; text-align:center;
      animation:fadeIn 0.6s ease forwards; text-shadow:0 1px 3px rgba(0,0,0,0.5);
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .speaking-indicator { position:absolute; bottom:0.75rem; right:0.75rem; display:flex; gap:3px; align-items:flex-end; }
    .speaking-bar { width:3px; background:#ffd84a; border-radius:2px; opacity:0; }
    .speaking-indicator.active .speaking-bar { animation:speakPulse 0.8s ease-in-out infinite alternate; opacity:0.8; }
    .speaking-bar:nth-child(1){height:6px;animation-delay:0s}
    .speaking-bar:nth-child(2){height:12px;animation-delay:.15s}
    .speaking-bar:nth-child(3){height:8px;animation-delay:.3s}
    .speaking-bar:nth-child(4){height:14px;animation-delay:.1s}
    .speaking-bar:nth-child(5){height:6px;animation-delay:.25s}
    @keyframes speakPulse{from{transform:scaleY(.4)}to{transform:scaleY(1)}}

    .step-label { font-family:'Cinzel Decorative',serif; font-size:0.7rem; color:#b89840; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.4rem; }
    .timer-bar-wrap { width:100%; height:3px; background:rgba(255,216,74,0.1); border-radius:2px; margin-bottom:1rem; overflow:hidden; }
    .timer-bar { height:100%; background:linear-gradient(90deg,#ff2a3a,#ffd84a,#3ab8e0); border-radius:2px; transition:width 0.1s linear; }
    .btn-row { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; }
    .voice-error { font-size:0.75rem; color:#ff9f5a; margin-bottom:0.75rem; font-style:italic; }

    /* DONE */
    .done-screen { text-align:center; animation:fadeIn 0.8s ease forwards; display:flex; flex-direction:column; align-items:center; padding-top:4rem; }
  </style>
</head>

  <!-- VOICE PICKER -->
  <div id="screen-voice" class="screen hidden">
    <p class="screen-label">Choose your narrator</p>
    <div class="voice-grid" id="voice-grid"></div>
    <button class="btn-primary" onclick="goToCards()">Continue →</button>
    <button class="btn-ghost" onclick="showScreen('cards')">← Back</button>
  </div>

  <!-- CARD SELECTION -->
  <div id="screen-cards" class="screen hidden">
    <p class="screen-label" id="cards-label"></p>
    <div class="card-section">
      <div class="section-header">
        <span class="section-title good-title">Servants of Arthur</span>
        <span class="section-count good-count" id="good-count-badge">0 / 0</span>
      </div>
      <div id="good-roles-list"></div>
    </div>
    <div class="card-section">
      <div class="section-header">
        <span class="section-title evil-title">Minions of Mordred</span>
        <span class="section-count evil-count" id="evil-count-badge">0 / 0</span>
      </div>
      <div id="evil-roles-list"></div>
    </div>
    <div class="ratio-bar">
      <span>Good: <b id="ratio-good">0</b> / <span id="ratio-good-max">0</span></span>
      <span id="ratio-status" class="ratio-bad">⚠ Adjust roles</span>
      <span>Evil: <b id="ratio-evil">0</b> / <span id="ratio-evil-max">0</span></span>
    </div>
    <button class="btn-primary" id="begin-btn" disabled onclick="startNight()">Start Narration</button>
    <button class="btn-ghost" onclick="goToVoice()">🎙 Change Voice</button>
    <button class="btn-ghost" onclick="showScreen('players')">← Change Players</button>
  </div>

  <!-- NIGHT PHASE -->
  <div id="screen-night" class="screen hidden">

      <div class="step-indicator" id="step-dots"></div>
      <div class="step-label" id="step-label"></div>
      <div class="narration-box">
        <p class="narration-text" id="narration-text"></p>
        <div class="speaking-indicator" id="speaking-indicator">
          <div class="speaking-bar"></div><div class="speaking-bar"></div>
          <div class="speaking-bar"></div><div class="speaking-bar"></div>
          <div class="speaking-bar"></div>
        </div>
      </div>
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      <div id="voice-error-msg" class="voice-error hidden">⚠ Speech unavailable — read the text aloud</div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="replayStep()">↺ Replay</button>
        <button class="btn-ghost" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
        <button class="btn-primary" id="next-btn" onclick="skipStep()">Next →</button>
      </div>
    </div>
  </div>

<script>
const RATIOS = {4:{g:2,e:2},5:{g:3,e:2},6:{g:4,e:2},7:{g:4,e:3},8:{g:5,e:3},9:{g:6,e:3},10:{g:6,e:4}};

const GOOD_ROLES = [
  {id:"arthur",   name:"Arthur",           required:false, desc:"Knows Morgan le Fay, must remain hidden"},
  {id:"cleric",   name:"Cleric",           required:false, desc:"Knows Arthur's identity"},
  {id:"loyal1",   name:"Loyal Servant",    required:false, generic:true},
  {id:"loyal2",   name:"Loyal Servant",    required:false, generic:true},
  {id:"loyal3",   name:"Loyal Servant",    required:false, generic:true},
  {id:"loyal4",   name:"Loyal Servant",    required:false, generic:true},
  {id:"loyal5",   name:"Loyal Servant",    required:false, generic:true},
];

const EVIL_ROLES = [
  {id:"morgan",     name:"Morgan le Fay",    required:true,  desc:"Not affected by the Magic token"},
  {id:"scion",      name:"Scion",            required:false, desc:"Evil, unknown to Morgan (4-5 players)"},
  {id:"changeling", name:"Changeling",       required:false, desc:"Evil, unknown to others (6+ players)"},
  {id:"blind",      name:"Blind Hunter",     required:false, desc:"Can initiate The Hunt in final quest"},
  {id:"minion1",    name:"Minion of Mordred",required:false, generic:true},
  {id:"minion2",    name:"Minion of Mordred",required:false, generic:true},
];

const STEP_LABELS = {
  start:"Prepare",
  scion_thumb:"Scion Signals", morgan_sees:"Morgan Sees", scion_fist:"Scion Hides", morgan_close:"Eyes Shut",
  evil_open:"Evil Awakens", evil_close:"Eyes Down",
  arthur_thumb:"Signal Arthur", arthur_open:"Arthur Sees", arthur_close:"Eyes Shut",
  cleric_thumb:"Guide Cleric", cleric_open:"Cleric Sees", cleric_close:"Rest",
  wake:"Dawn"
};

const VOICE_PRESETS = [
  {id:"herald",   type:"browser", emoji:"📯", name:"The Herald",    rate:1.00, pitch:0.70, hints:["google uk english male","daniel","george","james"]},
  {id:"vampire",  type:"browser", emoji:"🧛", name:"The Vampire",   rate:0.92, pitch:0.45, hints:["google uk english male","daniel","george","david"]},
  {id:"sorcerer", type:"browser", emoji:"🧙", name:"The Sorcerer",  rate:0.85, pitch:0.55, hints:["google uk english male","daniel","george","david"]},
  {id:"demon",    type:"browser", emoji:"😈", name:"The Demon",     rate:0.80, pitch:0.25, hints:["google uk english male","david","daniel","george"]},
];

const PREVIEW_TEXT = "Scion, extend your thumb so that Morgan le Fay may know of you.";

let playerCount=0, selected=new Set(), script=[], stepIdx=0;
let timerRAF=null, isPaused=false;
let synth=window.speechSynthesis, selectedVoiceId="herald", allVoices=[];
let currentAudio=null;

function loadVoices() { allVoices = synth ? synth.getVoices() : []; }
function getBestVoice(preset) {
  for (const h of preset.hints) {
    const v = allVoices.find(v => v.name.toLowerCase().includes(h) && /en/i.test(v.lang));
    if (v) return v;
  }
  return allVoices.find(v => /en/i.test(v.lang)) || null;
}

function showScreen(id) {
  ["players","voice","cards","night","done"].forEach(s =>
    document.getElementById("screen-"+s).classList.toggle("hidden", s !== id)
  );
}

// ── PLAYERS ──────────────────────────────────────────────────────────
function choosePlayers(n) {
  playerCount = n;
  const ratio = RATIOS[n];
  selected = new Set(["morgan"]);
  let gn = ratio.g, en = ratio.e - 1; // morgan already counted

  // Evil setup per rulebook
  if (n <= 5) {
    selected.add("scion"); en--;           // Scion required for 4-5 players
  } else {
    selected.add("changeling"); en--;      // Changeling required for 6+ players
    if (en > 0) { selected.add("minion1"); en--; }
    if (en > 0) { selected.add("minion2"); en--; }
  }

  // Good setup per rulebook
  if (n >= 7)  { selected.add("duke");     gn--; }
  if (n >= 9)  { selected.add("archduke"); gn--; }
  for (let i = 1; i <= 4 && gn > 0; i++) { selected.add("loyal"+i); gn--; }

  loadVoices();
  renderCards();
  showScreen("cards");
}

// ── VOICE PICKER ──────────────────────────────────────────────────────
function renderVoicePicker() {
  const grid = document.getElementById("voice-grid");
  grid.innerHTML = "";
  VOICE_PRESETS.forEach(preset => {
    const row = document.createElement("div");
    row.className = "voice-row"+(preset.id===selectedVoiceId?" selected":"");
    row.id = "vrow-"+preset.id;
    row.onclick = () => selectVoice(preset.id);
    row.innerHTML = `
      <div class="voice-radio"><div class="voice-radio-dot"></div></div>
      <div class="voice-emoji">${preset.emoji}</div>
      <div class="voice-info"><div class="voice-name">${preset.name}</div></div>
      <button class="preview-btn" id="pbtn-${preset.id}"
        onclick="event.stopPropagation();previewVoice('${preset.id}')">▶ Preview</button>
    `;
    grid.appendChild(row);
  });
}

function selectVoice(id) {
  selectedVoiceId = id;
  document.querySelectorAll(".voice-row").forEach(r => r.classList.remove("selected"));
  const el = document.getElementById("vrow-"+id);
  if (el) el.classList.add("selected");
}

function stopAll() {
  synth && synth.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll(".preview-btn").forEach(b => { b.textContent="▶ Preview"; b.classList.remove("playing"); });
}

function previewVoice(id) {
  const preset = VOICE_PRESETS.find(p => p.id===id);
  if (!preset) return;
  stopAll(); selectVoice(id);
  const btn = document.getElementById("pbtn-"+id);
  btn.textContent = "■ Stop"; btn.classList.add("playing");
  if (!synth) return;
  const utt = new SpeechSynthesisUtterance(PREVIEW_TEXT);
  utt.rate=preset.rate; utt.pitch=preset.pitch; utt.volume=1;
  const v = getBestVoice(preset); if (v) utt.voice=v;
  utt.onstart = () => { btn.textContent="■ Stop"; };
  utt.onend = utt.onerror = () => { btn.textContent="▶ Preview"; btn.classList.remove("playing"); };
  synth.speak(utt);
}

function goToVoice() { stopAll(); renderVoicePicker(); showScreen("voice"); }
function goToCards() { stopAll(); renderCards(); showScreen("cards"); }

// ── CARDS ──────────────────────────────────────────────────────────────
function renderCards() {
  renderRoleList("good-roles-list", GOOD_ROLES, "good");
  renderRoleList("evil-roles-list", EVIL_ROLES, "evil");
  updateCounts();
}

function renderRoleList(cid, roles, side) {
  const c = document.getElementById(cid); c.innerHTML="";
  roles.forEach(role => {
    if (role.generic && !selected.has(role.id)) return;
    const active=selected.has(role.id), locked=role.required||role.generic;
    const div=document.createElement("div");
    div.className=`role-card ${side}${active?" active":""}${locked?" locked":""}`;
    if (!locked) div.onclick=()=>toggleRole(role);
    div.innerHTML=`
      <div class="role-checkbox">${active?"✓":""}</div>
      <div class="role-info">
        <div class="role-name">${role.name}</div>
        ${role.desc?`<div class="role-desc">${role.desc}</div>`:""}
      </div>
      ${role.required?'<span class="role-tag tag-required">required</span>':role.generic?'<span class="role-tag tag-auto">auto</span>':""}
    `;
    c.appendChild(div);
  });
}

function toggleRole(role) {
  const isGood=GOOD_ROLES.find(r=>r.id===role.id);
  const pool=isGood?GOOD_ROLES:EVIL_ROLES;
  const ratio=RATIOS[playerCount];
  const maxCount=isGood?ratio.g:ratio.e;
  if (selected.has(role.id)) {
    selected.delete(role.id);
    const g=pool.find(r=>r.generic&&!selected.has(r.id));
    if (g) selected.add(g.id);
  } else {
    const g=[...pool].reverse().find(r=>r.generic&&selected.has(r.id));
    if (g) { selected.delete(g.id); selected.add(role.id); }
    else { const cur=pool.filter(r=>selected.has(r.id)).length; if(cur<maxCount) selected.add(role.id); }
  }
  renderCards();
}

function updateCounts() {
  const ratio=RATIOS[playerCount];
  const g=GOOD_ROLES.filter(r=>selected.has(r.id)).length;
  const e=EVIL_ROLES.filter(r=>selected.has(r.id)).length;
  const ok=g===ratio.g&&e===ratio.e;
  document.getElementById("good-count-badge").textContent=`${g} / ${ratio.g}`;
  document.getElementById("evil-count-badge").textContent=`${e} / ${ratio.e}`;
  document.getElementById("ratio-good").textContent=g;
  document.getElementById("ratio-evil").textContent=e;
  document.getElementById("ratio-good-max").textContent=ratio.g;
  document.getElementById("ratio-evil-max").textContent=ratio.e;
  const s=document.getElementById("ratio-status");
  s.textContent=ok?"✓ Balanced":"⚠ Adjust roles"; s.className=ok?"ratio-ok":"ratio-bad";
  document.getElementById("begin-btn").disabled=!ok;
  document.getElementById("cards-label").textContent=`${playerCount} players · Choose your cards`;
}

// ── SCRIPT (exact per official rulebook) ──────────────────────────────
function buildScript() {
  const hasArthur    = selected.has("arthur");
  const hasCleric    = selected.has("cleric");
  const hasScion     = selected.has("scion");
  const hasChangeling= selected.has("changeling");
  const s = [];

  s.push({id:"start", text:"Everybody close your eyes. Extend your fist in front of you.", pause:1500});

  if (hasScion) {
    // 4-5 player: exact rulebook script
    s.push({id:"scion_thumb",  text:"Scion, extend your thumb so that Morgan le Fay may know of you.", pause:1500});
    s.push({id:"morgan_sees",  text:"Morgan le Fay, open your eyes and look around so that you know your Scion.", pause:2000});
    s.push({id:"scion_fist",   text:"Scion, re-form your hand into a fist.", pause:1250});
    s.push({id:"morgan_close", text:"Morgan le Fay, close your eyes.", pause:1250});
  } else {
    // 6+ player: exact rulebook script
    const changelingNote = hasChangeling ? ", not Changeling," : "";
    s.push({id:"evil_open",  text:`Minions of Mordred and Morgan le Fay${changelingNote} open your eyes and look around so that you may know of each other.`, pause:2000});
    s.push({id:"evil_close", text:"Minions of Mordred and Morgan le Fay, close your eyes.", pause:1250});
  }

  // Optional: Arthur phase
  if (hasArthur) {
    s.push({id:"arthur_thumb", text:"Agents of evil, raise your thumbs so that Arthur may identify you.", pause:1500});
    s.push({id:"arthur_open",  text:"Arthur, open your eyes and behold the agents of evil.", pause:2500});
    s.push({id:"arthur_close", text:"Agents of evil, lower your thumbs. Arthur, close your eyes.", pause:1500});
  }

  // Optional: Cleric phase
  if (hasCleric && hasArthur) {
    s.push({id:"cleric_thumb", text:"Arthur, raise your thumb so that the Cleric may find you.", pause:1500});
    s.push({id:"cleric_open",  text:"Cleric, open your eyes. Behold Arthur.", pause:2500});
    s.push({id:"cleric_close", text:"Cleric, close your eyes. Arthur, lower your thumb.", pause:1500});
  }

  s.push({id:"wake", text:"Everybody open your eyes. The quest begins. May the worthy prevail... and conquer.", pause:0});
  return s;
}


// ── NIGHT ──────────────────────────────────────────────────────────────
function startNight() {
  script=buildScript(); stepIdx=0; isPaused=false;
  const pb=document.getElementById("pause-btn"); if(pb) pb.textContent="⏸ Pause";
  showScreen("night"); renderDots(); speakStep(0);
}

function renderDots() {
  const c=document.getElementById("step-dots"); c.innerHTML="";
  script.forEach((_,i)=>{ const d=document.createElement("div"); d.className="step-dot"+(i<stepIdx?" done":i===stepIdx?" current":""); c.appendChild(d); });
}
function updateDots() { document.querySelectorAll(".step-dot").forEach((d,i)=>{ d.className="step-dot"+(i<stepIdx?" done":i===stepIdx?" current":""); }); }

function afterSpoken(step, idx) {
  setSpeaking(false);
  if (step.pause>0) {
    const start=Date.now();
    const tick=()=>{
      if (isPaused) return;
      const el=Date.now()-start;
      document.getElementById("timer-bar").style.width=Math.max(0,100-(el/step.pause)*100)+"%";
      if (el<step.pause) timerRAF=requestAnimationFrame(tick);
      else speakStep(idx+1);
    };
    timerRAF=requestAnimationFrame(tick);
  } else { showScreen("done"); }
}

function speakStep(idx) {
  if (idx>=script.length) { showScreen("done"); return; }
  stepIdx=idx; updateDots();
  const step=script[idx];
  document.getElementById("step-label").textContent=STEP_LABELS[step.id]||"";
  const box=document.getElementById("narration-text");
  box.style.animation="none"; box.textContent=`"${step.text}"`;
  void box.offsetWidth; box.style.animation="fadeIn 0.6s ease forwards";
  document.getElementById("next-btn").textContent=idx<script.length-1?"Next →":"Finish";
  document.getElementById("timer-bar").style.width="100%";
  setSpeaking(false);
  if (!synth) { document.getElementById("voice-error-msg").classList.remove("hidden"); return; }
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(step.text);
  const preset=VOICE_PRESETS.find(p=>p.id===selectedVoiceId)||VOICE_PRESETS[0];
  utt.rate=preset.rate; utt.pitch=preset.pitch; utt.volume=1;
  const v=getBestVoice(preset); if(v) utt.voice=v;
  utt.onstart=()=>setSpeaking(true);
  utt.onerror=()=>{ setSpeaking(false); document.getElementById("voice-error-msg").classList.remove("hidden"); };
  utt.onend=()=>afterSpoken(step,idx);
  synth.speak(utt);
}

function togglePause() {
  const btn=document.getElementById("pause-btn");
  if (!isPaused) {
    isPaused=true; synth&&synth.pause(); cancelAnimationFrame(timerRAF);
    btn.textContent="▶ Resume";
  } else {
    isPaused=false; btn.textContent="⏸ Pause"; synth&&synth.resume();
    const pct=parseFloat(document.getElementById("timer-bar").style.width)/100;
    if (pct>0&&pct<1) {
      const step=script[stepIdx];
      const start=Date.now()-(step.pause*(1-pct));
      const tick=()=>{
        if (isPaused) return;
        const el=Date.now()-start;
        const np=Math.max(0,100-(el/step.pause)*100);
        document.getElementById("timer-bar").style.width=np+"%";
        if (!isPaused) { if(np>0) timerRAF=requestAnimationFrame(tick); else speakStep(stepIdx+1); }
      };
      timerRAF=requestAnimationFrame(tick);
    }
  }
}

function setSpeaking(val) { document.getElementById("speaking-indicator").classList.toggle("active",val); }
function cancelCurrent() { synth&&synth.cancel(); if(currentAudio){currentAudio.pause();currentAudio=null;} cancelAnimationFrame(timerRAF); setSpeaking(false); isPaused=false; }
function skipStep()   { cancelCurrent(); speakStep(stepIdx+1); }
function replayStep() { cancelCurrent(); speakStep(stepIdx); }
function restart()    { cancelCurrent(); showScreen("players"); }

if (synth) { synth.onvoiceschanged=loadVoices; loadVoices(); }
</script>
</body>
